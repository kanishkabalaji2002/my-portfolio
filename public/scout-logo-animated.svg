<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="scout-logo-title">
  <title id="scout-logo-title">Scout</title>
  <defs>
    <style>
      .scout-ring {
        stroke-dasharray: 723;
        stroke-dashoffset: 723;
        animation: scout-ring-draw 1.05s cubic-bezier(0.45, 0, 0.2, 1) forwards 0.06s;
      }
      .scout-ticks {
        opacity: 0;
        animation: scout-ticks-in 0.55s ease forwards 0.78s;
      }
      .scout-ticks line {
        stroke: #fff;
        stroke-width: 10;
        stroke-linecap: round;
      }
      .scout-dot {
        transform-origin: 256px 256px;
        transform: scale(0);
        animation: scout-dot-pop 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 0.52s;
      }
      .scout-mark-breathe {
        transform-origin: 256px 256px;
        animation: scout-mark-breathe 3.2s ease-in-out infinite 1.95s;
      }
      @keyframes scout-ring-draw {
        to { stroke-dashoffset: 0; }
      }
      @keyframes scout-ticks-in {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes scout-dot-pop {
        to { transform: scale(1); }
      }
      @keyframes scout-mark-breathe {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.028); }
      }
      @media (prefers-reduced-motion: reduce) {
        .scout-ring { stroke-dashoffset: 0; animation: none; }
        .scout-ticks { opacity: 1; animation: none; }
        .scout-dot { transform: scale(1); animation: none; }
        .scout-mark-breathe { animation: none; }
      }
    </style>
  </defs>
  <rect width="512" height="512" rx="128" fill="#0a0a0a"/>
  <g class="scout-mark-breathe">
    <circle class="scout-ring" cx="256" cy="256" r="115" fill="none" stroke="#ffffff" stroke-width="9"/>
    <g class="scout-ticks">
      <line x1="256" y1="78" x2="256" y2="152"/>
      <line x1="256" y1="360" x2="256" y2="434"/>
      <line x1="78" y1="256" x2="152" y2="256"/>
      <line x1="360" y1="256" x2="434" y2="256"/>
    </g>
    <circle class="scout-dot" cx="256" cy="256" r="14" fill="#ffffff"/>
  </g>
</svg>
